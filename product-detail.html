<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Product - Rainy Days</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="header-fixed.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="header.js"></script>
  </head>
  <body>
    <header id="site-header">
      <a href="index.html" class="logo">
        <img src="images/RainyDays_Logo.png" width="100px" />
      </a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li>
            <a href="cart.html" class="cart-link">
              Cart
              <span class="cart-count" style="display: none">0</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="product-detail">
        <div class="product-detail__container">
          <!-- Product Image -->
          <div class="product-detail__image">
            <img src="" alt="Product loading..." />
          </div>

          <!-- Product Info -->
          <div class="product-detail__info">
            <h1 class="product-detail__title">Loading...</h1>

            <p class="product-detail__price">0 NOK</p>

            <p class="product-detail__gender">-</p>

            <p class="product-detail__description">
              Loading product details...
            </p>

            <!-- Size Selector -->
            <div class="size-selector">
              <h3>Select Size:</h3>
              <div class="size-options">
                <button class="size-option" data-size="S">S</button>
                <button class="size-option selected" data-size="M">M</button>
                <button class="size-option" data-size="L">L</button>
                <button class="size-option" data-size="XL">XL</button>
              </div>
            </div>

            <!-- Add to Cart Button -->
            <button class="add-to-cart-btn primary">Add to Cart</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="__content">
        <img
          src="images/RainyDays_Logo.png"
          class="__logo"
          alt="Rainy Days logo"
          width="200px"
        />
        <ul class="__links">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </footer>

    <script type="module" src="js/product-detail.js"></script>
  </body>
</html>
